    <main class="main-content">
        <!-- ================= HOME ================= -->
        <div id="registerhome" class="card">
            <p>New User?</p>
            <button id="registerbutton">Sign Up</button>

            <p>Already have an account?</p>
            <button id="loginbutton">Login</button>
        </div>

        <!-- ================= REGISTER ================= -->
        <form id="register_form" class="card hidden">
            <button type="button" class="backBtn">⬅ Back</button>

            <label for="reg_name">Name</label>
            <input id="reg_name" type="text" required />

            <label for="reg_email">Email</label>
            <input id="reg_email" type="email" required />

            <label for="reg_password">Password</label>
            <input id="reg_password" type="password" required />

            <label for="reg_confirm">Confirm Password</label>
            <input id="reg_confirm" type="password" required />

            <button type="submit" id="createbutton">Create Account</button>
        </form>

        <!-- ================= LOGIN ================= -->
        <form id="login_form" class="card hidden">
            <button type="button" class="backBtn">⬅ Back</button>

            <label for="login_email">Email</label>
            <input id="login_email" type="email" required />

            <label for="login_password">Password</label>
            <input id="login_password" type="password" required />

            <button type="submit">Login</button>
        </form>
