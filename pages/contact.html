    <form id="contact_form" class="contact_form" action="#" method="post">

        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Please enter your name" required>

        <br>

        <label for="email">Email ID</label>
        <input type="email" id="email" name="email" placeholder="Please enter your email" required>

        <br>

        <div class="radio-group">
            <input type="radio" id="query" name="type" value="Query">
            <label for="query">Query</label>

            <input type="radio" id="feedback" name="type" value="Feedback">
            <label for="feedback">Feedback</label>
        </div>

        <br><br>

        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Write your message here..." required></textarea>

        <br><br>

        <button type="submit" id="submit" style="background: rgb(74, 101, 221); color: white;">
            Submit
        </button>

    </form>
